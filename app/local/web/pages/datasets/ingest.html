<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice Light Ingestion</title>
    <link rel="stylesheet" href="/pages/datasets/ingest.css" />
  </head>
  <body>
    <main class="layout">
      <header class="toolbar">
        <div>
          <h1>Dataset Ingestion</h1>
          <p id="status">Ready</p>
        </div>
        <nav>
          <a href="/">Home</a>
          <a href="/datasets">Dashboard</a>
        </nav>
      </header>

      <section class="panel">
        <form id="ingestion-form" class="ingestion-form">
          <label>
            Dataset name
            <input id="dataset-name" name="dataset_name" type="text" value="luel-local" required />
          </label>
          <label>
            Root path
            <input
              id="root-path"
              name="root_path"
              type="text"
              value="/app/data/luel/sessions"
              required
            />
          </label>
          <label>
            Sample layout
            <select id="dataset-layout" name="layout">
              <option value="two_audio_files">Exactly two audio files</option>
              <option value="mix_and_two_speakers">Mix and two speaker files</option>
            </select>
          </label>
          <label>
            Parallel workers
            <input id="max-workers" name="max_workers" type="number" value="4" min="1" max="32" />
          </label>
          <button type="submit">Start ingestion</button>
        </form>
        <pre id="error-output" class="error-output" hidden></pre>
      </section>

      <section class="panel">
        <div class="section-heading">
          <h2>Jobs</h2>
          <button id="refresh-jobs" type="button">Refresh</button>
        </div>
        <div id="jobs-list" class="jobs-list"></div>
      </section>
    </main>
    <script src="/pages/datasets/ingest.js"></script>
  </body>
</html>
