<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice Light</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #f4f5f2;
        color: #1e2528;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        margin: 0 auto;
        max-width: 980px;
        padding: 32px 24px;
      }

      h1 {
        font-size: 32px;
        line-height: 1.1;
        margin: 0 0 8px;
      }

      p {
        color: #5a666b;
        margin: 0 0 22px;
      }

      a {
        align-items: center;
        background: #ffffff;
        border: 1px solid #d3dadd;
        border-radius: 8px;
        color: #172024;
        display: flex;
        justify-content: space-between;
        min-height: 76px;
        padding: 18px;
        text-decoration: none;
      }

      a:focus,
      a:hover {
        border-color: #146b63;
      }

      strong {
        display: block;
        font-size: 17px;
        margin-bottom: 4px;
      }

      span {
        color: #5a666b;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Voice Light</h1>
      <p>Analysis tools and dataset dashboards.</p>
      <a href="/analyses/end-of-turn">
        <span>
          <strong>End-of-turn analysis</strong>
          Inspect speaker waveforms and compare end-of-turn detector outputs.
        </span>
        <span>Open</span>
      </a>
    </main>
  </body>
</html>
