services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: voice_light
      POSTGRES_USER: voice_light
      POSTGRES_PASSWORD: voice_light
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voice_light -d voice_light"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - voice-light-postgres:/var/lib/postgresql/data

  migrate:
    build: .
    environment:
      VOICE_LIGHT_DATABASE_URL: postgresql://voice_light:voice_light@postgres:5432/voice_light
    command: ["python", "-m", "app.local.db.migrate"]
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    environment:
      VOICE_LIGHT_DATABASE_URL: postgresql://voice_light:voice_light@postgres:5432/voice_light
      VOICE_LIGHT_HOST: 0.0.0.0
      VOICE_LIGHT_PORT: "8000"
      VOICE_LIGHT_RELOAD: "false"
      VOICE_LIGHT_COMPUTE_URL: ${VOICE_LIGHT_COMPUTE_URL:-}
      VOICE_LIGHT_COMPUTE_TOKEN: ${VOICE_LIGHT_COMPUTE_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro

volumes:
  voice-light-postgres:
